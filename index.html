<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>TEST TEST TEST</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<!-- ENVELOPE SCREEN (landed full screen) -->
<section class="envelope-screen" id="envelopeScreen">
  <div class="envelope">
    <img src="assets/envelope-bottom.png" class="envelope-bottom">

    <!-- FLAP WITH SEAL INSIDE IMAGE -->
    <img src="assets/envelope-flap.png"
         class="envelope-flap"
         id="sealBtn">

    <div class="tap-text">
      <div class="invite-title">A Special Invitation</div>
      <div class="invite-sub">Tap to open</div>
    </div>
  </div>
</section>

<!-- MAIN (hidden until envelope opens) -->
<main id="mainContent" class="hidden">

  <!-- VIDEO HERO -->
  <section class="video-section">
    <video id="heroVideo" autoplay muted loop playsinline>
      <source src="assets/video.mp4" type="video/mp4">
    </video>
    <div class="video-overlay"></div>
    <div class="video-text">
      <h1 class="groom">Sarfaraz Hussain</h1>
      <span class="amp">&amp;</span>
      <h1 class="bride">Khulood Hassan</h1>
    </div>
  </section>

  <!-- DETAILS VIDEO SECTION -->
  <section class="details-video-section">
    <video autoplay muted loop playsinline>
      <source src="assets/details-video.mp4" type="video/mp4">
    </video>
  </section>
  

  <!-- INFO BOXES (date/time/venue/location) -->
  <section class="info-section">
    <div class="info-card">
      <h3>Date</h3>
      <p>5th April 2026</p>
    </div>

    <div class="info-card">
      <h3>Time</h3>
      <p>11:30 AM</p>
    </div>

    <div class="info-card">
      <h3>Lunch</h3>
      <p>After Nikah</p>
    </div>

    <div class="info-card">
      <h3>Venue</h3>
      <p>Heritage Convention Hall</p>
      <a class="map-link"
        href="https://www.google.com/maps/search/Heritage+Convention+Hall"
        target="_blank">
        View Location
      </a>
    </div>
  </section>

</main>

<!-- audio file (optional) -->
<audio id="bgMusic" src="assets/music.mp3" loop></audio>

<script src="script.js"></script>
</body>
</html>
