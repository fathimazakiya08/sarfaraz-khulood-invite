<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>TEST TEST TEST</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<!-- ENVELOPE SCREEN (landed full screen) -->
<section class="envelope-screen" id="envelopeScreen">
  <div class="envelope">
    <img src="assets/envelope-bottom.png" class="envelope-bottom">

    <!-- FLAP WITH SEAL INSIDE IMAGE -->
    <img src="assets/envelope-flap.png"
         class="envelope-flap"
         id="sealBtn">

    <div class="tap-text">
      <div class="invite-title">A Special Invitation</div>
      <div class="invite-sub">Tap to open</div>
    </div>
  </div>
</section>

<!-- MAIN (hidden until envelope opens) -->
<main id="mainContent" class="hidden">

  <!-- VIDEO HERO -->
  <section class="video-section">
    <video id="heroVideo" autoplay muted playsinline>
      <source src="assets/video.mp4" type="video/mp4">
    </video>
    <div class="video-overlay"></div>
    <div class="video-text">
      <h1 class="groom">Sarfaraz Hussain</h1>
      <span class="amp">&amp;</span>
      <h1 class="bride">Khulood Hassan</h1>
    </div>
  </section>

  <!-- DETAILS VIDEO SECTION -->
  <section class="details-video-section">
    <video autoplay muted loop playsinline>
      <source src="assets/details-video.mp4" type="video/mp4">
    </video>
  </section>
  
  <!-- THIRD VIDEO SECTION -->
  <section class="third-section">
    <div class="third-video-wrap">
      <video autoplay muted loop playsinline>
        <source src="assets/third-section.mp4" type="video/mp4">
      </video>
    </div>
  </section>

  <!-- LOCATION PAGE -->
  <section class="location-section">

    <!-- Background Video -->
    <video autoplay muted loop playsinline class="location-video">
      <source src="assets/location-bg.mp4" type="video/mp4">
    </video>

    <!-- Map Box + Button -->
    <div class="location-map-container">

      <div class="location-map">
        <iframe
          src="https://www.google.com/maps?q=Heritage+Convention+Hall+Chikkamagaluru&output=embed">
        </iframe>
      </div>

      <a
        href="https://www.google.com/maps?q=Heritage+Convention+Hall+Chikkamagaluru"
        target="_blank"
        class="open-maps-btn">

        Open in Google Maps

      </a>

    </div>

  </section>
  
</main>

<!-- audio file (optional) -->
<audio id="bgMusic" src="assets/music.mp3.mpeg" loop></audio>

<script src="script.js"></script>
</body>
</html>
